<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Hill - Gino and Carlo</title>
    <style>
        :root { --accent: #22c55e; --bg: #0a0a0a; --card: #161616; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; text-align: center; margin: 0; padding-bottom: 160px; }
        .prize-banner { background: var(--accent); color: black; font-weight: bold; padding: 12px; font-size: 14px; text-transform: uppercase; position: sticky; top: 0; z-index: 10; }
        .header { padding: 15px; border-bottom: 1px solid #333; }
        .match-box { background: var(--card); margin: 15px; padding: 25px; border-radius: 15px; border: 1px solid #333; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .player { flex: 1; }
        .player-name { font-size: 28px; font-weight: 800; color: var(--accent); display: block; margin-top: 5px; }
        .vs { opacity: 0.3; font-style: italic; font-size: 18px; margin: 0 10px; }
        
        .lists-container { padding: 0 20px; text-align: left; max-width: 500px; margin: auto; }
        h3 { border-bottom: 1px solid #333; padding-bottom: 5px; font-size: 16px; text-transform: uppercase; opacity: 0.7; margin-top: 30px; }
        .entry { background: #1a1a1a; padding: 14px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid transparent; }
        .leader-entry { border-left-color: var(--accent); }
        
        .controls { position: fixed; bottom: 0; width: 100%; background: #111; padding: 20px; box-sizing: border-box; border-top: 1px solid #333; box-shadow: 0 -5px 20px rgba(0,0,0,0.8); }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 15px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; font-size: 16px; }
        button { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        .btn-join { background: var(--accent); color: black; min-width: 80px; }
        .win-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-king { background: #3b82f6; color: white; }
        .btn-chal { background: #8b5cf6; color: white; }
    </style>
</head>
<body>
    <div class="prize-banner">🏆 Monthly Prize: $200 Bar Tab</div>
    <div class="header"><h1>GINO AND CARLO</h1></div>
    
    <div class="match-box">
        <div class="player"><span style="font-size:10px; opacity:0.6">KING</span><span id="kingName" class="player-name">---</span></div>
        <div class="vs">vs</div>
        <div class="player"><span style="font-size:10px; opacity:0.6">CHALLENGER</span><span id="chalName" class="player-name">---</span></div>
    </div>

    <div class="lists-container">
        <h3>Top Hustlers (Monthly)</h3>
        <div id="leaderboardList"></div>
        
        <h3>The Rail</h3>
        <div id="railList"></div>
    </div>

    <div class="controls">
        <div class="input-group">
            <input type="text" id="nameInput" placeholder="Enter Name to Join">
            <button class="btn-join" onclick="joinRail()">JOIN</button>
        </div>
        <div class="win-buttons">
            <button class="btn-king" onclick="recordWin('king')">KING WON</button>
            <button class="btn-chal" onclick="recordWin('chal')">CHALLENGER WON</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, increment, deleteDoc, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your Integrated Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAJIICqGbSr8DwyyPtG-cRCRr4W7T7xd00"
            authDomain: "the-hill-pilot.firebaseapp.com",
            projectId: "the-hill-pilot",
            storageBucket: "the-hill-pilot.appspot.com",
            messagingSenderId: "965013734125",
            appId: "1:965013734125:web:bef8fbb9029fb898d742e4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const railRef = collection(db, "rail");
        const leadersRef = collection(db, "leaderboard");

        let currentPlayers = [];

        window.joinRail = async () => {
            const input = document.getElementById('nameInput');
            const name = input.value.trim();
            if (name) {
                try {
                    await addDoc(railRef, { name: name, time: Date.now() });
                    input.value = '';
                } catch (e) { alert("Error joining: " + e.message); }
            }
        };

        window.recordWin = async (winner) => {
            if (currentPlayers.length < 2) {
                alert("Need a King and a Challenger to record a win!");
                return;
            }
            
            const king = currentPlayers[0];
            const challenger = currentPlayers[1];
            const winnerName = (winner === 'king') ? king.name : challenger.name;
            const loserId = (winner === 'king') ? challenger.id : king.id;

            try {
                // Update Leaderboard
                const q = query(leadersRef, where("name", "==", winnerName));
                const snap = await getDocs(q);
                if (snap.empty) {
                    await addDoc(leadersRef, { name: winnerName, wins: 1 });
                } else {
                    await updateDoc(snap.docs[0].ref, { wins: increment(1) });
                }

                // Remove Loser
                await deleteDoc(doc(db, "rail", loserId));
            } catch (e) { alert("Error recording win: " + e.message); }
        };

        onSnapshot(query(railRef, orderBy("time", "asc")), (snap) => {
            currentPlayers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            document.getElementById('kingName').innerText = currentPlayers[0]?.name || "---";
            document.getElementById('chalName').innerText = currentPlayers[1]?.name || "---";
            
            document.getElementById('railList').innerHTML = currentPlayers.slice(2).map((p, i) => `
                <div class="entry"><span>${i+1}. ${p.name}</span><span style="opacity:0.4">Waiting</span></div>
            `).join('');
        });

        onSnapshot(query(leadersRef, orderBy("wins", "desc")), (snap) => {
            document.getElementById('leaderboardList').innerHTML = snap.docs.slice(0, 5).map(d => `
                <div class="entry leader-entry">
                    <span>${d.data().name}</span>
                    <span style="color:var(--accent); font-weight:bold;">${d.data().wins} Wins</span>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
