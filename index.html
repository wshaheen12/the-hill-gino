<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Hill - Gino and Carlo</title>
    <style>
        :root { --accent: #22c55e; --bg: #0a0a0a; --card: #161616; --warning: #ef4444; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; text-align: center; margin: 0; }
        
        .event-banner { background: #fff; color: #000; font-weight: 900; padding: 12px; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        .prize-banner { background: var(--accent); color: black; font-weight: bold; padding: 8px; font-size: 12px; text-transform: uppercase; position: sticky; top: 0; z-index: 100; }
        
        .top-nav { position: sticky; top: 32px; background: var(--bg); z-index: 90; padding-bottom: 10px; border-bottom: 1px solid #333; }
        
        .match-box { background: var(--card); margin: 15px; padding: 20px; border-radius: 12px; border: 1px solid #333; display: flex; justify-content: space-around; align-items: center; }
        .player-name { font-size: 24px; font-weight: 800; color: var(--accent); display: block; margin-top: 4px; }
        
        .lists-container { padding: 0 20px 240px; text-align: left; max-width: 500px; margin: auto; }
        h3 { border-bottom: 1px solid #333; padding-bottom: 5px; font-size: 14px; text-transform: uppercase; opacity: 0.6; margin-top: 25px; }
        
        .entry { background: #1a1a1a; padding: 10px 12px; margin-bottom: 6px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .remove-btn { color: var(--warning); border: 1px solid var(--warning); padding: 4px 8px; border-radius: 4px; font-size: 10px; background: transparent; font-weight: bold; }

        .controls { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px; box-sizing: border-box; border-top: 1px solid #444; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
        .input-group { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: white; font-size: 16px; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        button { padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        .btn-join { background: var(--accent); color: black; }
        .btn-forfeit { background: #444; color: white; font-size: 10px; line-height: 1.2; }
        .btn-king { background: #2563eb; color: white; text-transform: uppercase; font-size: 11px; }
        .btn-chal { background: #7c3aed; color: white; text-transform: uppercase; font-size: 11px; }
    </style>
</head>
<body>
    <div class="event-banner">Gino & Carlo - King of the Hill - June 2026</div>
    <div class="prize-banner">🏆 Monthly Prize: $200 Bar Tab</div>
    
    <div class="top-nav">
        <div class="match-box">
            <div class="player"><span style="font-size:10px; opacity:0.6; font-weight:bold;">KING</span><span id="kingName" class="player-name">---</span></div>
            <div style="opacity:0.3; font-style:italic; font-size: 14px;">VS</div>
            <div class="player"><span style="font-size:10px; opacity:0.6; font-weight:bold;">CHALLENGER</span><span id="chalName" class="player-name">---</span></div>
        </div>
    </div>

    <div class="lists-container">
        <h3>Top Players (Monthly)</h3>
        <div id="leaderboardList"></div>
        
        <h3>The Rail</h3>
        <div id="railList"></div>
    </div>

    <div class="controls">
        <div class="input-group">
            <input type="text" id="nameInput" placeholder="New Player Name">
            <button class="btn-join" onclick="joinRail()">JOIN</button>
        </div>
        <div class="btn-row">
            <button class="btn-forfeit" onclick="forfeitDelay()">FORFEIT<br>(DELAY)</button>
            <button class="btn-king" onclick="recordWin('king')">KING WON</button>
            <button class="btn-chal" onclick="recordWin('chal')">CHAL WON</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, increment, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJIICqGbSr8DwyyPtG-cRCRr4W7T7xd00",
            authDomain: "the-hill-pilot.firebaseapp.com",
            projectId: "the-hill-pilot",
            storageBucket: "the-hill-pilot.firebasestorage.app",
            messagingSenderId: "965013734125",
            appId: "1:965013734125:web:bef8fbb9029fb898d742e4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const railRef = collection(db, "rail");
        const leadersRef = collection(db, "leaderboard");

        let currentPlayers = [];

        window.joinRail = async () => {
            const input = document.getElementById('nameInput');
            if (input.value.trim()) {
                await addDoc(railRef, { 
                    name: input.value.trim(), 
                    time: Date.now(), 
                    status: "active" 
                });
                input.value = '';
            }
        };

        window.removeFromRail = async (id) => {
            if (confirm("Remove player from the active queue?")) {
                await updateDoc(doc(db, "rail", id), { status: "removed" });
            }
        };

        window.forfeitDelay = async () => {
            if (currentPlayers.length < 2) return;
            const choice = prompt("Who is delaying? Type '1' for KING or '2' for CHALLENGER:");
            if (choice === '1' || choice === '2') {
                const index = parseInt(choice) - 1;
                const offender = currentPlayers[index];
                try {
                    await updateDoc(doc(db, "rail", offender.id), { status: "forfeited" });
                    await addDoc(railRef, { name: offender.name, time: Date.now(), status: "active" });
                } catch (e) { alert(e.message); }
            }
        };

        window.recordWin = async (winner) => {
            if (currentPlayers.length < 2) return;
            const winnerName = (winner === 'king') ? currentPlayers[0].name : currentPlayers[1].name;
            const loserObj = (winner === 'king') ? currentPlayers[1] : currentPlayers[0];

            try {
                // 1. Update Leaderboard
                const q = query(leadersRef, where("name", "==", winnerName));
                const snap = await getDocs(q);
                if (snap.empty) await addDoc(leadersRef, { name: winnerName, wins: 1 });
                else await updateDoc(snap.docs[0].ref, { wins: increment(1) });
                
                // 2. Archive the old "losing" rail entry
                await updateDoc(doc(db, "rail", loserObj.id), { status: "lost" });

                // 3. AUTO-RELIST: Create a fresh entry for the loser at the bottom
                await addDoc(railRef, { 
                    name: loserObj.name, 
                    time: Date.now(), 
                    status: "active" 
                });

            } catch (e) { alert(e.message); }
        };

        const railQuery = query(railRef, orderBy("time", "asc"));

        onSnapshot(railQuery, (snap) => {
            currentPlayers = snap.docs
                .map(d => ({ id: d.id, ...d.data() }))
                .filter(p => p.status === "active");

            document.getElementById('kingName').innerText = currentPlayers[0]?.name || "---";
            document.getElementById('chalName').innerText = currentPlayers[1]?.name || "---";
            
            const waitlist = currentPlayers.slice(2);
            document.getElementById('railList').innerHTML = waitlist.map((p, i) => `
                <div class="entry">
                    <span>${i+3}. ${p.name}</span>
                    <button class="remove-btn" onclick="removeFromRail('${p.id}')">REMOVE</button>
                </div>
            `).join('') || '<div style="opacity:0.3; font-size:12px; padding:10px;">Rail is currently empty.</div>';
        });

        onSnapshot(query(leadersRef, orderBy("wins", "desc")), (snap) => {
            document.getElementById('leaderboardList').innerHTML = snap.docs.slice(0, 5).map(d => `
                <div class="entry" style="border-left: 4px solid var(--accent)">
                    <span>${d.data().name}</span>
                    <span style="color:var(--accent); font-weight:bold;">${d.data().wins} Wins</span>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
