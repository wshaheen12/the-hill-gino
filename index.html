<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Hill - Gino and Carlo</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --accent: #22c55e; --bg: #0a0a0a; --card: #161616; --warning: #ef4444; --edit: #f59e0b; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        
        .event-banner { background: #fff; color: #000; font-weight: 900; padding: 12px; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        .prize-banner { background: var(--accent); color: black; font-weight: bold; padding: 8px; font-size: 12px; text-transform: uppercase; position: sticky; top: 0; z-index: 100; }
        
        .top-nav { position: sticky; top: 32px; background: var(--bg); z-index: 90; padding-bottom: 10px; border-bottom: 1px solid #333; }
        .match-box { background: var(--card); margin: 15px; padding: 20px; border-radius: 12px; border: 1px solid #333; display: flex; justify-content: space-around; align-items: center; }
        .player-name { font-size: 24px; font-weight: 800; color: var(--accent); display: block; margin-top: 4px; }
        
        .lists-container { padding: 0 20px 240px; text-align: left; max-width: 500px; margin: auto; }
        h3 { border-bottom: 1px solid #333; padding-bottom: 5px; font-size: 14px; text-transform: uppercase; opacity: 0.6; margin-top: 25px; }
        
        .entry { background: #1a1a1a; padding: 12px; margin-bottom: 6px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; cursor: grab; position: relative; }
        /* Drag Handle Notation */
        .entry::before { content: '↕️'; margin-right: 12px; opacity: 0.5; font-size: 12px; }
        .entry:active { cursor: grabbing; }
        
        .entry-actions { display: flex; gap: 8px; }
        .btn-small { padding: 4px 8px; border-radius: 4px; font-size: 10px; background: transparent; font-weight: bold; border: 1px solid; cursor: pointer; }
        .remove-btn { color: var(--warning); border-color: var(--warning); }
        .edit-btn { color: var(--edit); border-color: var(--edit); }

        .controls { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px; box-sizing: border-box; border-top: 1px solid #444; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
        .input-group { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: white; font-size: 16px; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        button { padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        .btn-join { background: var(--accent); color: black; }
        .btn-undo { background: #333; color: #ff4444; font-size: 11px; border: 1px solid #444; }
        .btn-king { background: #2563eb; color: white; }
        .btn-chal { background: #7c3aed; color: white; }
        .btn-forfeit { background: #444; color: white; font-size: 10px; }
        
        .sortable-ghost { opacity: 0.1; background: var(--accent); }
    </style>
</head>
<body>
    <div class="event-banner">Gino & Carlo - King of the Hill - June 2026</div>
    <div class="prize-banner">🏆 Monthly Prize: $200 Bar Tab</div>
    
    <div class="top-nav">
        <div class="match-box">
            <div class="player">
                <span style="font-size:10px; opacity:0.6; font-weight:bold;">KING</span>
                <span id="kingName" class="player-name">---</span>
                <span id="kingStreak" style="font-size:12px; opacity:0.8;"></span>
            </div>
            <div style="opacity:0.3; font-style:italic; font-size: 14px;">VS</div>
            <div class="player">
                <span style="font-size:10px; opacity:0.6; font-weight:bold;">CHALLENGER</span>
                <span id="chalName" class="player-name">---</span>
            </div>
        </div>
    </div>

    <div class="lists-container">
        <h3>June Leaderboard</h3>
        <div id="leaderboardList"></div>
        
        <h3>The Rail (Drag ↕️ to Reorder)</h3>
        <div id="railList"></div>
    </div>

    <div class="controls">
        <div class="input-group">
            <input type="text" id="nameInput" placeholder="New Player Name">
            <button class="btn-join" onclick="joinRail()">JOIN</button>
        </div>
        <div class="btn-row">
            <button class="btn-undo" onclick="undoLastMatch()">UNDO LAST</button>
            <button class="btn-king" onclick="recordWin('king')">KING WON</button>
            <button class="btn-chal" onclick="recordWin('chal')">CHAL WON</button>
        </div>
        <button class="btn-forfeit" onclick="forfeitDelay()">FORFEIT (DELAY)</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, increment, getDocs, where, deleteDoc, limit, writeBatch, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJIICqGbSr8DwyyPtG-cRCRr4W7T7xd00",
            authDomain: "the-hill-pilot.firebaseapp.com",
            projectId: "the-hill-pilot",
            storageBucket: "the-hill-pilot.firebasestorage.app",
            messagingSenderId: "965013734125",
            appId: "1:965013734125:web:bef8fbb9029fb898d742e4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const railRef = collection(db, "rail");
        const leadersRef = collection(db, "leaderboard");
        const snapshotsRef = collection(db, "snapshots");

        let currentPlayers = [];
        const railListEl = document.getElementById('railList');

        new Sortable(railListEl, {
            animation: 150,
            ghostClass: 'sortable-ghost',
            handle: '.entry',
            onEnd: async () => {
                const batch = writeBatch(db);
                const now = Date.now();
                Array.from(railListEl.children).forEach((item, index) => {
                    batch.update(doc(db, "rail", item.getAttribute('data-id')), { time: now + index });
                });
                await batch.commit();
            }
        });

        async function saveSnapshot() {
            const data = currentPlayers.map(p => ({ name: p.name, time: p.time, sessionWins: p.sessionWins || 0 }));
            await addDoc(snapshotsRef, { state: data, timestamp: serverTimestamp() });
        }

        window.undoLastMatch = async () => {
            const q = query(snapshotsRef, orderBy("timestamp", "desc"), limit(1));
            const snap = await getDocs(q);
            if (snap.empty) return alert("No history found.");

            if (confirm("Revert rail to the previous state?")) {
                const batch = writeBatch(db);
                // Clear current active rail
                currentPlayers.forEach(p => batch.update(doc(db, "rail", p.id), { status: "undone" }));
                // Restore from snapshot
                const previousState = snap.docs[0].data().state;
                previousState.forEach(p => {
                    const newRef = doc(railRef);
                    batch.set(newRef, { ...p, status: "active" });
                });
                await batch.commit();
                await deleteDoc(snap.docs[0].ref);
            }
        };

        window.joinRail = async () => {
            const val = document.getElementById('nameInput').value.trim();
            if (val) {
                await addDoc(railRef, { name: val, time: Date.now(), status: "active", sessionWins: 0 });
                document.getElementById('nameInput').value = '';
            }
        };

        window.recordWin = async (winner) => {
            if (currentPlayers.length < 2) return;
            await saveSnapshot(); // Save state BEFORE changes
            
            const winIdx = winner === 'king' ? 0 : 1;
            const loseIdx = winner === 'king' ? 1 : 0;
            const winnerObj = currentPlayers[winIdx];
            const loserObj = currentPlayers[loseIdx];

            try {
                // Update Win Counts
                const q = query(leadersRef, where("name", "==", winnerObj.name));
                const lSnap = await getDocs(q);
                if (lSnap.empty) await addDoc(leadersRef, { name: winnerObj.name, wins: 1, streaks: 0 });
                else await updateDoc(lSnap.docs[0].ref, { wins: increment(1) });

                // Cycle Loser
                await updateDoc(doc(db, "rail", loserObj.id), { status: "lost" });
                await addDoc(railRef, { name: loserObj.name, time: Date.now(), status: "active", sessionWins: 0 });

                // Streak Logic
                let newStreak = (winner === 'king' ? (winnerObj.sessionWins || 0) : 0) + 1;
                if (newStreak >= 5) {
                    const q2 = query(leadersRef, where("name", "==", winnerObj.name));
                    const lSnap2 = await getDocs(q2);
                    if (!lSnap2.empty) await updateDoc(lSnap2.docs[0].ref, { streaks: increment(1) });
                    await updateDoc(doc(db, "rail", winnerObj.id), { status: "rotated" });
                    await addDoc(railRef, { name: winnerObj.name, time: Date.now() + 10, status: "active", sessionWins: 0 });
                    alert(`${winnerObj.name} hit 5 wins! 🍺 Rotating to back.`);
                } else {
                    await updateDoc(doc(db, "rail", winnerObj.id), { sessionWins: newStreak });
                }
            } catch (e) { console.error(e); }
        };

        onSnapshot(query(railRef, orderBy("time", "asc")), (snap) => {
            currentPlayers = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(p => p.status === "active");
            document.getElementById('kingName').innerText = currentPlayers[0]?.name || "---";
            document.getElementById('kingStreak').innerText = currentPlayers[0] ? `(${currentPlayers[0].sessionWins || 0}/5)` : "";
            document.getElementById('chalName').innerText = currentPlayers[1]?.name || "---";
            
            railListEl.innerHTML = currentPlayers.slice(2).map((p, i) => `
                <div class="entry" data-id="${p.id}">
                    <span>${i+3}. ${p.name}</span>
                    <div class="entry-actions">
                        <button class="btn-small edit-btn" onclick="editPlayerName('${p.id}', '${p.name}')">EDIT</button>
                        <button class="btn-small remove-btn" onclick="removeFromRail('${p.id}')">REMOVE</button>
                    </div>
                </div>
            `).join('') || '<div style="opacity:0.3; padding:10px;">Rail is empty.</div>';
        });

        onSnapshot(query(leadersRef, orderBy("wins", "desc")), (snap) => {
            document.getElementById('leaderboardList').innerHTML = snap.docs.slice(0, 5).map((d, i) => {
                const data = d.data();
                return `<div class="entry" style="border-left: 4px solid var(--accent); cursor: default;">
                    <span>${i === 0 ? '👑 ' : ''}${data.name} ${data.streaks > 0 ? '🍺'.repeat(data.streaks) : ''}</span>
                    <span style="color:var(--accent); font-weight:bold;">${data.wins} Wins</span>
                </div>`
            }).join('');
        });

        window.editPlayerName = async (id, old) => {
            const n = prompt("New name:", old);
            if (n && n !== old) await updateDoc(doc(db, "rail", id), { name: n.trim() });
        };

        window.removeFromRail = async (id) => {
            if (confirm("Remove?")) await updateDoc(doc(db, "rail", id), { status: "removed" });
        };

        window.forfeitDelay = async () => {
            if (currentPlayers.length < 2) return;
            const c = prompt("Forfeit: 1 (KING) or 2 (CHAL)");
            if (c === '1' || c === '2') {
                const p = currentPlayers[parseInt(c)-1];
                await updateDoc(doc(db, "rail", p.id), { status: "forfeit" });
                await addDoc(railRef, { name: p.name, time: Date.now(), status: "active", sessionWins: 0 });
            }
        };
    </script>
</body>
</html>
